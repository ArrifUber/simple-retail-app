services:
  database:
    image: postgres:16
    container_name: db-learn-retail-app
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: retail_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: